<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign UP</title>
    <link rel="stylesheet" href="./sign-up.css">
</head>
<body>
    <div class="container">
        <div class="intro">
            <h1>Welcome to Rental</h1>
            <h3>The best global vehicle sharing marketplace</h3>
            <p>Have a vehicle? Earn money as aHost.Rent your dream vehicle</p>
        </div>
        <div class="sign-up">
            <h1>Rental</h1>
            <h3>Create An Account.</h3>
            <button class="social-btn"><img width="25" height="25" src="https://img.icons8.com/color/48/facebook-new.png" alt="facebook-new"/>Continue with facebook</button>
            <button class="social-btn"><img width="20" height="20" src="https://img.icons8.com/color/48/google-logo.png" alt="google-logo"/>Continue with Google</button>
            <div class="underline"></div>
          <form action="">
            Name* <br>
            <input type="text" class="input-field" placeholder="Enter your name"><br>
            Email* <br>
            <input type="email" class="input-field" placeholder="Entaner your email"><br>
            Password* <br>
            <input type="password" class="input-field" placeholder="Create password"><br>
            <div class="terms">
            <input type="checkbox" name="" id=""><p>I agree to the Terms and Privacy Policy. </p>
            </div>
            <br>
            <button class="btn-sign-up
            ">Sign Up</button>
        </form>
            <p style="text-align: center;;">Already have an account? <a href="#" style="color: black;">Login here</a></p>

        </div>
    </div>
</body>
</html>
