<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Order</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        orderDetails = ['Booking No', 'Vehicle', 'Pick Up Location', 'Date', 'Return Date',
            'Payment', 'Status'
        ];
        function getStatus(status) {
            const styles = {
                Booking: "bg-[#f7a600] text-white",
                Completed: "bg-[#4caf50] text-white",
                Cancelled: "bg-[#ff3b5c] text-white"
            };

            return `<span class="${styles[status]} px-5 py-1.5 rounded-full text-[14px] font-semibold">
                ${status}
            </span>`;
        }

    </script>
</head>

<body class="bg-[#f5f5f5] font-sans text-[#222]">

    <div class="max-w-[1120px] mx-auto px-5 py-12">

        <h1 class="text-[56px] font-bold text-[#4a4a4a] mb-14">My Order</h1>

        <div class="grid grid-cols-1 lg:grid-cols-[345px_1fr] gap-5 items-start">

            <aside class="bg-white border border-[#e7e7e7] rounded-lg min-h-[760px] p-7 flex flex-col justify-between">
                <div>

                    <div class="mb-8">
                        <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=300&q=80" alt="Profile"
                            class="w-[115px] h-[115px] rounded-full object-cover mb-5" />
                        <h2 class="text-[24px] font-semibold leading-none mb-2">Rovan Reels</h2>
                        <p class="text-[16px] text-[#6b6b6b]">rovanreels@gmail.com</p>
                    </div>

                    <!-- Menu -->
                    <nav class="space-y-3">
                        <a href="#"
                            class="flex items-center gap-4 text-[18px] text-[#1f1f1f] px-4 py-4 rounded-md hover:bg-gray-100 transition">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 fill-current" viewBox="0 0 24 24">
                                <path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z" />
                            </svg>
                            <span>Dashboard</span>
                        </a>

                        <a href="#"
                            class="flex items-center gap-4 text-[18px] text-[#1f1f1f] px-4 py-4 rounded-md hover:bg-gray-100 transition">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 fill-current" viewBox="0 0 24 24">
                                <path
                                    d="M12 12c2.761 0 5-2.239 5-5S14.761 2 12 2 7 4.239 7 7s2.239 5 5 5zm0 2c-3.866 0-7 2.239-7 5v1h14v-1c0-2.761-3.134-5-7-5z" />
                            </svg>
                            <span>My Profile</span>
                        </a>

                        <a href="#"
                            class="flex items-center gap-4 text-[18px] text-white bg-[#0d0d11] px-4 py-4 rounded-md">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 fill-current" viewBox="0 0 24 24">
                                <path
                                    d="M19 4h-1V2h-2v2H8V2H6v2H5C3.9 4 3 4.9 3 6v13c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 15H5V10h14v9zm0-11H5V6h14v2z" />
                            </svg>
                            <span>My Order</span>
                        </a>

                        <a href="#"
                            class="flex items-center gap-4 text-[18px] text-[#1f1f1f] px-4 py-4 rounded-md hover:bg-gray-100 transition">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 fill-current" viewBox="0 0 24 24">
                                <path
                                    d="M12 2a5 5 0 00-5 5v1H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2v-9a2 2 0 00-2-2h-2V7a5 5 0 00-5-5zm-3 6V7a3 3 0 116 0v1H9z" />
                            </svg>
                            <span>Insurance & Policy</span>
                        </a>
                    </nav>
                </div>

                <div class="pt-10">
                    <button
                        class="w-full border border-[#e6e6e6] rounded-md px-4 py-4 flex items-center gap-4 text-[18px] text-[#222] hover:bg-gray-50 transition">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 fill-current" viewBox="0 0 24 24">
                            <path d="M10 17l1.41-1.41L8.83 13H21v-2H8.83l2.58-2.59L10 7l-5 5 5 5z" />
                            <path d="M19 19H10v2h9a2 2 0 002-2V5a2 2 0 00-2-2h-9v2h9v14z" />
                        </svg>
                        <span>Sign Out</span>
                    </button>
                </div>
            </aside>

            <main class="space-y-6">

                <section class="bg-white border border-[#e7e7e7] rounded-lg px-6 py-7">

                    <h2 class="text-[22px] font-semibold mb-7">Update Profile</h2>

                    <!-- Row 1 -->
                    <div class="flex gap-6 mb-5">
                        <div class="flex flex-col w-full space-y-1">
                            <label for="username" class="font-medium">Username</label>
                            <input type="text" id="username"
                                class="border border-[#e6e6e6] p-2 rounded-md w-full focus:outline-none focus:ring-2 focus:ring-blue-400">
                        </div>

                        <div class="flex flex-col w-full space-y-1">
                            <label for="email" class="font-medium">Email Address</label>
                            <input type="email" id="email"
                                class="border border-[#e6e6e6] p-2 rounded-md w-full focus:outline-none focus:ring-2 focus:ring-blue-400">
                        </div>
                    </div>

                    <!-- Password Row -->
                    <div class="flex gap-6 mb-6">
                        <div class="flex flex-col w-full space-y-1">
                            <label for="password" class="font-medium">Password</label>
                            <input type="password" id="password"
                                class="border border-[#e6e6e6] p-2 rounded-md w-full focus:outline-none focus:ring-2 focus:ring-blue-400">
                        </div>

                        <div class="flex flex-col w-full space-y-1">
                            <label for="confirm_password" class="font-medium">Confirm Password</label>
                            <input type="password" id="confirm_password"
                                class="border border-[#e6e6e6] p-2 rounded-md w-full focus:outline-none focus:ring-2 focus:ring-blue-400">
                        </div>
                    </div>
                    <div>
                        <button
                            class="bg-gray-900 text-white px-6 py-2 rounded-md font-medium hover:bg-blue-600 transition">
                            Update Profile
                        </button>
                    </div>
                </section>

            </main>
        </div>
    </div>

</body>

</html>
