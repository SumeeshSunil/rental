<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            /* grid-template-rows: 100px 100px ; */
            gap: 10px;
        }

        .box {
            background: lightblue;
            padding: 20px;
            text-align: center;
        }
        .box:nth-child(1) {
            grid-column: span 3;
        }

        .box:nth-child(2) {
            background: lightgreen;
            grid-row: span 2;
        }

        .box:nth-child(3) {
            background: red;
        }

        .box:nth-child(4) {
            background: orange;
        }

        .box:nth-child(5) {
            background: violet;
        }

        .box:nth-child(6) {
            background: blue;
        }


        .box:nth-child(7) {
            background: maroon;
            grid-column: span 3;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
       
        <div class="box">8</div>
    </div>

</body>

</html>
